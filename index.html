              <div className="input-group"><label>Quote amount (excl. GST)</label><input className="input" type="number" placeholder="e.g. 2400" value={quoteForm.amount} onChange={e=>setQuoteForm({...quoteForm,amount:e.target.value})} />
                {quoteForm.amount && <span className="hint">Total inc GST: {formatCurrency(parseFloat(quoteForm.amount)*1.1)}</span>}
              </div>
              <div />
              <div className="input-group"><label>Setup date</label><input className="input" type="date" value={quoteForm.setupDate} onChange={e=>setQuoteForm({...quoteForm,setupDate:e.target.value})} /></div>
              <div className="input-group"><label>Collection date</label><input className="input" type="date" value={quoteForm.collectionDate} onChange={e=>setQuoteForm({...quoteForm,collectionDate:e.target.value})} /></div>
            </div>
            <div className="input-group" style={{marginBottom:24}}><label>What's included</label><textarea className="input" placeholder="Describe what's included: furniture, art, soft furnishings, number of rooms, hire period..." value={quoteForm.desc} onChange={e=>setQuoteForm({...quoteForm,desc:e.target.value})} /></div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
              <button className="btn btn-s" onClick={()=>navigate('stylist-quotes')}>Cancel</button>
              <button className="btn btn-p" onClick={submitQuote}><span style={{width:14,height:14}}>{Icons.send}</span> Send Quote</button>
            </div>
          </div>
        ) : (
          <div className="card" style={{borderLeft:'3px solid var(--accent)'}}>
            <div className="label-sm" style={{marginBottom:12}}>Your Quote</div>
            <div className="serif" style={{fontSize:28,marginBottom:4}}>{formatCurrency(j.quoteTotal)}</div>
            <div style={{fontSize:12,color:'var(--text-sec)',marginBottom:16}}>{formatCurrency(j.quoteAmount)} + {formatCurrency(j.quoteGst)} GST</div>
            <p style={{fontSize:14,color:'var(--text-sec)',lineHeight:1.7,marginBottom:16}}>{j.quoteDesc}</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <div><div className="label-sm" style={{marginBottom:4}}>Setup</div><div style={{fontSize:14}}>{j.quoteSetupDate ? formatDate(j.quoteSetupDate) : '—'}</div></div>
              <div><div className="label-sm" style={{marginBottom:4}}>Collection</div><div style={{fontSize:14}}>{j.quoteCollectionDate ? formatDate(j.quoteCollectionDate) : '—'}</div></div>
            </div>
            <div style={{marginTop:16}}>
              <span className={`badge ${j.status==='quote_received'?'badge-pending':j.status==='declined'?'badge-cancelled':'badge-confirmed'}`}>
                {j.status==='quote_received'?'Awaiting agent response':j.status==='declined'?'Declined by agent':'Accepted'}
              </span>
            </div>
          </div>
        )}
      </div>
    </DashLayout>
  );
}

function StylistJobs() {
  const { stylingJobs, setStylingJobs, navigate, showToast } = useApp();
  const myJobs = stylingJobs.filter(j=>j.stylistId==='s1' && ['accepted','setup','styled','collection','completed'].includes(j.status));
  const statusLabels = {accepted:'Accepted',setup:'Setup Done',styled:'Styled',collection:'Collecting',completed:'Completed'};
  return (
    <DashLayout title="Jobs">
      <div style={{display:'grid',gap:12}}>
        {myJobs.map(j => (
          <div key={j.id} className="card" style={{cursor:'pointer'}} onClick={()=>navigate('stylist-job-'+j.id)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16,flexWrap:'wrap'}}>
              <div>
                <div style={{fontWeight:500,marginBottom:4}}>{j.address}</div>
                <div style={{fontSize:13,color:'var(--text-sec)'}}>{j.agentName} &middot; Setup: {j.quoteSetupDate?formatDate(j.quoteSetupDate):'—'} &middot; Collection: {j.quoteCollectionDate?formatDate(j.quoteCollectionDate):'—'}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="serif" style={{fontSize:18}}>{formatCurrency(j.quoteTotal)}</div>
                <span className={`badge badge-confirmed`}>{statusLabels[j.status]}</span>
              </div>
            </div>
          </div>
        ))}
        {myJobs.length===0 && <div className="card empty-state"><h3>No active jobs</h3><p>Accepted quotes will appear here as jobs</p></div>}
      </div>
    </DashLayout>
  );
}

function StylistJobDetail({ jobId }) {
  const { stylingJobs, setStylingJobs, navigate, showToast } = useApp();
  const j = stylingJobs.find(x=>x.id===jobId);
  if (!j) return <DashLayout title="Job"><div className="empty-state"><h3>Not found</h3></div></DashLayout>;
  const nextStatus = {accepted:'setup',setup:'styled',styled:'collection',collection:'completed'};
  const nextLabel = {accepted:'Mark Setup Complete',setup:'Mark as Styled',styled:'Mark Collection Done',collection:'Mark Job Completed'};
  return (
    <DashLayout title="Job Detail" actions={<button className="btn btn-ghost btn-sm" onClick={()=>navigate('stylist-jobs')}><span style={{width:14,height:14}}>{Icons.chevLeft}</span> Back</button>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:24,alignItems:'start'}}>
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="label-sm" style={{marginBottom:6}}>{j.agentName}</div>
            <h2 className="serif" style={{fontSize:22,marginBottom:16}}>{j.address}</h2>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <div><div className="label-sm" style={{marginBottom:4}}>Property</div><div style={{fontWeight:500}}>{j.propertyType} &middot; {j.bedrooms} bed, {j.bathrooms} bath</div></div>
              <div><div className="label-sm" style={{marginBottom:4}}>Rooms</div><div style={{fontSize:14}}>{j.rooms}</div></div>
              <div><div className="label-sm" style={{marginBottom:4}}>Setup</div><div style={{fontWeight:500}}>{j.quoteSetupDate?formatDateLong(j.quoteSetupDate):'—'}</div></div>
              <div><div className="label-sm" style={{marginBottom:4}}>Collection</div><div style={{fontWeight:500}}>{j.quoteCollectionDate?formatDateLong(j.quoteCollectionDate):'—'}</div></div>
            </div>
            {j.notes && (<><hr className="rule" style={{margin:'20px 0'}} /><div className="label-sm" style={{marginBottom:4}}>Agent Notes</div><p style={{fontSize:14,color:'var(--text-sec)'}}>{j.notes}</p></>)}
          </div>
          <div className="card">
            <div className="label-sm" style={{marginBottom:8}}>Quote</div>
            <div className="serif" style={{fontSize:24,marginBottom:4}}>{formatCurrency(j.quoteTotal)}</div>
            <p style={{fontSize:14,color:'var(--text-sec)',lineHeight:1.6}}>{j.quoteDesc}</p>
          </div>
        </div>
        <div>
          {nextStatus[j.status] && (
            <div className="card card-accent" style={{marginBottom:16}}>
              <div className="label-sm" style={{marginBottom:12}}>Next Step</div>
              <button className="btn btn-p btn-full btn-sm" onClick={()=>{setStylingJobs(prev=>prev.map(x=>x.id===j.id?{...x,status:nextStatus[j.status]}:x));showToast('Status updated');}}>{nextLabel[j.status]}</button>
            </div>
          )}
          {j.status==='completed' && (
            <div className="card card-accent" style={{marginBottom:16}}>
              <div className="label-sm" style={{marginBottom:8}}>Job Complete</div>
              <p style={{fontSize:13,color:'var(--success)'}}>This job has been completed.</p>
              <button className="btn btn-s btn-full btn-sm" style={{marginTop:12}} onClick={()=>showToast('Invoice generated')}><span style={{width:14,height:14}}>{Icons.invoice}</span> Generate Invoice</button>
            </div>
          )}
          <div className="card">
            <div className="label-sm" style={{marginBottom:8}}>Progress</div>
            {[{l:'Accepted',done:true},{l:'Setup complete',done:['setup','styled','collection','completed'].includes(j.status)},{l:'Property styled',done:['styled','collection','completed'].includes(j.status)},{l:'Furniture collected',done:['collection','completed'].includes(j.status)},{l:'Job completed',done:j.status==='completed'}].map((step,i) => (
              <div key={i} style={{display:'flex',gap:12,padding:'8px 0',opacity:step.done?1:0.4}}>
                <div style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${step.done?'var(--accent)':'var(--border)'}`,background:step.done?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {step.done && <span style={{width:10,height:10,color:'#fff'}}>{Icons.check}</span>}
                </div>
                <span style={{fontSize:13,fontWeight:step.done?500:400}}>{step.l}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </DashLayout>
  );
}

// ==================== GUEST VIEW (No auth required) ====================
function GuestBookingView({ token }) {
  const { bookings } = useApp();
  // Find booking containing this guest token
  let booking = null;
  let guest = null;
  for (const b of bookings) {
    const g = b.guests.find(g => g.token === token);
    if (g) { booking = b; guest = g; break; }
  }

  if (!booking || !guest) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'2rem'}}>
        <div style={{textAlign:'center',maxWidth:400}}>
          <div className="serif" style={{fontSize:28,fontWeight:600,marginBottom:16}}>Property<em style={{fontStyle:'italic',color:'var(--accent)',fontWeight:500}}>Lens</em></div>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <span style={{width:48,height:48,display:'block',margin:'0 auto 16px',color:'var(--text-ter)',opacity:0.4}}>{Icons.booking}</span>
            <h2 className="serif" style={{fontSize:22,marginBottom:8}}>Link not found</h2>
            <p style={{fontSize:14,color:'var(--text-sec)'}}>This booking link is invalid or has expired. Please contact the agent who invited you for an updated link.</p>
          </div>
        </div>
      </div>
    );
  }

  const isPast = new Date(booking.date + 'T' + booking.endTime) < new Date();

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* Header */}
      <div style={{borderBottom:'1px solid var(--border)',background:'var(--bg-card)'}}>
        <div style={{maxWidth:640,margin:'0 auto',padding:'20px 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div className="serif" style={{fontSize:22,fontWeight:600}}>Property<em style={{fontStyle:'italic',color:'var(--accent)',fontWeight:500}}>Lens</em></div>
          <span className="label-sm">Booking details</span>
        </div>
      </div>

      <div style={{maxWidth:640,margin:'0 auto',padding:'32px 24px'}}>
        {/* Status banner */}
        <div style={{
          padding:'16px 20px',
          borderRadius:8,
          marginBottom:24,
          background: booking.status === 'cancelled' || booking.status === 'declined' ? 'var(--danger-bg)' : booking.status === 'confirmed' || booking.status === 'in_progress' ? 'var(--success-bg)' : isPast ? 'var(--bg-muted)' : 'var(--warning-bg)',
          display:'flex', alignItems:'center', gap:12
        }}>
          <span style={{width:20,height:20,color: booking.status === 'cancelled' ? 'var(--danger)' : booking.status === 'confirmed' ? 'var(--success)' : 'var(--accent)'}}>
            {booking.status === 'confirmed' || booking.status === 'completed' || booking.status === 'delivered' ? Icons.check : booking.status === 'cancelled' || booking.status === 'declined' ? Icons.x : Icons.clock}
          </span>
          <div>
            <div style={{fontWeight:600,fontSize:14,textTransform:'capitalize'}}>{booking.status === 'confirmed' ? 'Booking confirmed' : booking.status === 'requested' ? 'Booking pending confirmation' : booking.status === 'cancelled' ? 'Booking cancelled' : booking.status.replace('_',' ')}</div>
            {booking.status === 'requested' && <div style={{fontSize:12,color:'var(--text-sec)',marginTop:2}}>The photographer has not yet confirmed this booking</div>}
          </div>
        </div>

        {/* Greeting */}
        <div style={{marginBottom:32}}>
          <div className="label-sm" style={{marginBottom:8}}>Hello, {guest.name}</div>
          <h1 className="serif" style={{fontSize:28,fontWeight:400,lineHeight:1.3}}>You're invited to a property photoshoot</h1>
          <p style={{fontSize:15,color:'var(--text-sec)',marginTop:8}}>
            {booking.agentName} from {booking.agentId === 'a1' ? 'Area Specialist' : 'the agency'} has invited you as {guest.role === 'homeowner' ? 'the homeowner' : guest.role === 'stylist' ? 'a stylist' : guest.role === 'assistant' ? 'an assistant' : 'a guest'} for this upcoming shoot.
          </p>
        </div>

        <hr className="rule" style={{margin:'0 0 24px'}} />

        {/* Booking details */}
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:14,marginBottom:20}}>
            <span style={{width:22,height:22,color:'var(--accent)',marginTop:2,flexShrink:0}}>{Icons.mapPin}</span>
            <div>
              <div className="label-sm" style={{marginBottom:4}}>Location</div>
              <div style={{fontSize:17,fontWeight:500}}>{booking.address}</div>
            </div>
          </div>
          <hr className="rule" style={{margin:'0 0 20px'}} />
          <div style={{display:'flex',alignItems:'flex-start',gap:14,marginBottom:20}}>
            <span style={{width:22,height:22,color:'var(--accent)',marginTop:2,flexShrink:0}}>{Icons.calendar}</span>
            <div>
              <div className="label-sm" style={{marginBottom:4}}>Date</div>
              <div style={{fontSize:17,fontWeight:500}}>{formatDateLong(booking.date)}</div>
            </div>
          </div>
          <hr className="rule" style={{margin:'0 0 20px'}} />
          <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
            <span style={{width:22,height:22,color:'var(--accent)',marginTop:2,flexShrink:0}}>{Icons.clock}</span>
            <div>
              <div className="label-sm" style={{marginBottom:4}}>Time</div>
              <div style={{fontSize:17,fontWeight:500}}>{formatTime(booking.startTime)} – {formatTime(booking.endTime)}</div>
            </div>
          </div>
        </div>

        {/* Property info */}
        <div className="card" style={{marginBottom:16}}>
          <div className="label-sm" style={{marginBottom:12}}>Property</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
            <div>
              <div style={{fontSize:12,color:'var(--text-sec)'}}>Type</div>
              <div style={{fontSize:14,fontWeight:500}}>{booking.propertyType}</div>
            </div>
            <div>
              <div style={{fontSize:12,color:'var(--text-sec)'}}>Bedrooms</div>
              <div style={{fontSize:14,fontWeight:500}}>{booking.bedrooms}</div>
            </div>
            <div>
              <div style={{fontSize:12,color:'var(--text-sec)'}}>Bathrooms</div>
              <div style={{fontSize:14,fontWeight:500}}>{booking.bathrooms}</div>
            </div>
          </div>
        </div>

        {/* People */}
        <div className="card" style={{marginBottom:16}}>
          <div className="label-sm" style={{marginBottom:12}}>People</div>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <div className="avatar" style={{width:36,height:36,fontSize:13}}>{booking.agentName[0]}</div>
            <div>
              <div style={{fontSize:14,fontWeight:500}}>{booking.agentName}</div>
              <div style={{fontSize:12,color:'var(--text-sec)'}}>Agent</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <div className="avatar" style={{width:36,height:36,fontSize:13}}>{booking.photographerName[0]}</div>
            <div>
              <div style={{fontSize:14,fontWeight:500}}>{booking.photographerName}</div>
              <div style={{fontSize:12,color:'var(--text-sec)'}}>Photographer</div>
            </div>
          </div>
          {booking.guests.filter(g2 => g2.token !== token).map((g2,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0'}}>
              <div className="avatar" style={{width:36,height:36,fontSize:13}}>{g2.name[0]}</div>
              <div>
                <div style={{fontSize:14,fontWeight:500}}>{g2.name}</div>
                <div style={{fontSize:12,color:'var(--text-sec)'}}>{g2.role}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Instructions */}
        {booking.instructions && (
          <div className="card" style={{marginBottom:16}}>
            <div className="label-sm" style={{marginBottom:8}}>Notes from the agent</div>
            <p style={{fontSize:14,color:'var(--text-sec)',lineHeight:1.6}}>{booking.instructions}</p>
          </div>
        )}

        {/* Map placeholder */}
        <div className="card" style={{marginBottom:24}}>
          <div style={{height:160,background:'var(--bg-muted)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-ter)'}}>
            <div style={{textAlign:'center'}}>
              <span style={{width:28,height:28,display:'block',margin:'0 auto 8px',opacity:0.4}}>{Icons.mapPin}</span>
              <div style={{fontSize:13}}>{booking.address}</div>
              <div style={{fontSize:11,color:'var(--text-ter)',marginTop:4}}>Map view available in full app</div>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{textAlign:'center',padding:'24px 0',borderTop:'1px solid var(--border)'}}>
          <div className="serif" style={{fontSize:16,fontWeight:600,marginBottom:4}}>Property<em style={{fontStyle:'italic',color:'var(--accent)',fontWeight:500}}>Lens</em></div>
          <p style={{fontSize:12,color:'var(--text-ter)'}}>This is a read-only booking summary. For questions, contact {booking.agentName} directly.</p>
          <p style={{fontSize:11,color:'var(--text-ter)',marginTop:8}}>You received this because {booking.agentName} added you as a guest. You do not need an account.</p>
        </div>
      </div>
    </div>
  );
}

// ==================== APP ROUTER ====================
function App() {
  const { page, toast, currentUser } = useApp();

  const renderPage = () => {
    if (page === 'login') return <LoginPage />;
    if (page === 'register') return <RegisterPage />;
    if (page.startsWith('guest-view-')) return <GuestBookingView token={page.replace('guest-view-','')} />;

    // Agent pages
    if (page === 'agent-home') return <AgentHome />;
    if (page === 'agent-calendar') return <AgentCalendar />;
    if (page === 'agent-bookings') return <AgentBookings />;
    if (page === 'agent-new-booking') return <NewBookingPage />;
    if (page.startsWith('agent-booking-')) return <BookingDetail bookingId={page.replace('agent-booking-','')} backPage="agent-bookings" />;
    if (page === 'agent-invoices') return <AgentInvoices />;
    if (page === 'agent-photographers') return <BrowsePhotographers />;
    if (page.startsWith('photographer-profile-')) return <PhotographerProfilePage id={page.replace('photographer-profile-','')} />;
    if (page === 'agent-stylists') return <BrowseStylists />;
    if (page.startsWith('stylist-profile-')) return <StylistPublicProfile id={page.replace('stylist-profile-','')} />;
    if (page.startsWith('agent-request-quote-')) return <AgentRequestQuote stylistId={page.replace('agent-request-quote-','')} />;
    if (page === 'agent-styling-jobs') return <AgentStylingJobs />;
    if (page.startsWith('agent-styling-job-')) return <AgentStylingJobDetail jobId={page.replace('agent-styling-job-','')} />;
    if (page === 'agent-profile') return <ProfilePage role="agent" />;

    // Photographer pages
    if (page === 'photo-home') return <PhotoHome />;
    if (page === 'photo-calendar') return <PhotoCalendar />;
    if (page === 'photo-bookings') return <PhotoBookings />;
    if (page.startsWith('photo-booking-')) return <BookingDetail bookingId={page.replace('photo-booking-','')} backPage="photo-bookings" />;
    if (page === 'photo-packages') return <PhotoPackages />;
    if (page === 'photo-availability') return <PhotoAvailability />;
    if (page === 'photo-invoices') return <PhotoInvoices />;
    if (page === 'photo-profile') return <ProfilePage role="photographer" />;

    // Stylist pages
    if (page === 'stylist-home') return <StylistHome />;
    if (page === 'stylist-calendar') return <StylistCalendar />;
    if (page === 'stylist-quotes') return <StylistQuotes />;
    if (page.startsWith('stylist-quote-')) return <StylistQuoteDetail jobId={page.replace('stylist-quote-','')} />;
    if (page === 'stylist-jobs') return <StylistJobs />;
    if (page.startsWith('stylist-job-')) return <StylistJobDetail jobId={page.replace('stylist-job-','')} />;
    if (page === 'stylist-invoices') return <StylistInvoices />;
    if (page === 'stylist-profile') return <ProfilePage role="stylist" />;

    // Shared
    if (page === 'notifications') return <NotificationsPage />;

    return <LoginPage />;
  };

  return (
    <>
      {renderPage()}
      {toast && <div className="toast"><span style={{width:16,height:16}}>{Icons.check}</span> {toast}</div>}
    </>
  );
}

// ==================== RENDER ====================
ReactDOM.render(
  <AppProvider><App /></AppProvider>,
  document.getElementById('root')
);
</script>
</body>
</html>
